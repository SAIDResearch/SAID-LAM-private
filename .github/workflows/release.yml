name: Build and Release

on:
  release:
    types: [created]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────────────────────
  # CPU wheels — work everywhere, no GPU required
  # ──────────────────────────────────────────────────────────────
  build-cpu:
    name: CPU · ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: cpu-${{ matrix.target }}

      - name: Install Maturin
        run: pip install maturin

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            libc6-dev-arm64-cross

      - name: Build CPU wheels (Linux)
        if: runner.os == 'Linux'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
        run: |
          maturin build --release --target ${{ matrix.target }} \
            --compatibility manylinux_2_35 \
            --interpreter python3.10 python3.11 python3.12 --out dist

      - name: Build CPU wheels (macOS)
        if: runner.os == 'macOS'
        run: |
          maturin build --release --target ${{ matrix.target }} \
            --interpreter python3.10 python3.11 python3.12 --out dist

      - name: Build CPU wheels (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          maturin build --release --target ${{ matrix.target }} \
            --interpreter python3.10 python3.11 python3.12 --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-cpu-${{ matrix.target }}
          path: dist/*.whl

  # ──────────────────────────────────────────────────────────────
  # CUDA wheels — Linux x86_64 only
  # ──────────────────────────────────────────────────────────────
  build-cuda:
    name: CUDA · x86_64-linux
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.1.1-devel-ubuntu22.04
    env:
      CUDA_COMPUTE_CAP: "80"
      # Prevent pip "externally-managed-environment" errors in container
      PIP_BREAK_SYSTEM_PACKAGES: "1"
      # Prevent tzdata interactive prompt from hanging the build
      DEBIAN_FRONTEND: noninteractive
      TZ: Etc/UTC

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps + Python
        run: |
          export DEBIAN_FRONTEND=noninteractive
          export TZ=Etc/UTC
          ln -snf /usr/share/zoneinfo/$TZ /etc/localtime
          echo $TZ > /etc/timezone
          apt-get update
          apt-get install -y --no-install-recommends \
            software-properties-common curl gcc pkg-config libssl-dev tzdata
          # Add deadsnakes for multiple Python versions
          add-apt-repository -y ppa:deadsnakes/ppa
          apt-get update
          apt-get install -y --no-install-recommends \
            python3.10 python3.10-dev python3.10-venv \
            python3.11 python3.11-dev python3.11-venv \
            python3.12 python3.12-dev python3.12-venv \
            python3-pip

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Maturin
        run: pip3 install maturin

      # Stub nvidia-smi — match the CSV format candle/bindgen_cuda expects
      # from `nvidia-smi --query-gpu=compute_cap --format=csv,noheader`
      - name: Stub nvidia-smi
        run: |
          mkdir -p /usr/local/bin
          printf '#!/bin/sh\ncase "$*" in\n*--query-gpu*) echo "8.0" ;;\n*) echo "NVIDIA-SMI (stub)" ;;\nesac\n' > /usr/local/bin/nvidia-smi
          chmod +x /usr/local/bin/nvidia-smi
          /usr/local/bin/nvidia-smi --query-gpu=compute_cap --format=csv,noheader

      - name: Build CUDA wheels
        run: |
          . "$HOME/.cargo/env"
          maturin build --release --features cuda \
            --compatibility manylinux_2_35 \
            --interpreter python3.10 python3.11 python3.12 \
            --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-cuda-x86_64-linux
          path: dist/*.whl

  # ──────────────────────────────────────────────────────────────
  # Metal wheels — macOS Apple Silicon GPU
  # ──────────────────────────────────────────────────────────────
  build-metal:
    name: Metal · aarch64-apple-darwin
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: metal

      - name: Install Maturin
        run: pip install maturin

      # Verify Metal SDK is available (Xcode ships it)
      - name: Verify Metal availability
        run: |
          xcrun --sdk macosx --show-sdk-path
          ls "$(xcrun --sdk macosx --show-sdk-path)/System/Library/Frameworks/Metal.framework" || echo "WARNING: Metal.framework not found"

      - name: Build Metal wheels
        run: |
          maturin build --release --features metal \
            --interpreter python3.10 python3.11 python3.12 \
            --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-metal-aarch64-apple-darwin
          path: dist/*.whl

  # ──────────────────────────────────────────────────────────────
  # Publish to PyPI
  # ──────────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [build-cpu, build-cuda, build-metal]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref, 'rc')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List all artifacts
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/

  # ──────────────────────────────────────────────────────────────
  # Publish to TestPyPI (release candidates: v*-rc*)
  # ──────────────────────────────────────────────────────────────
  publish-test:
    name: Publish to TestPyPI
    needs: [build-cpu, build-cuda, build-metal]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, 'rc')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List all artifacts
        run: ls -lh dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

  # ──────────────────────────────────────────────────────────────
  # GitHub Release
  # ──────────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: [build-cpu, build-cuda, build-metal]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release and upload wheels
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Smoke test
  # ──────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test · ${{ matrix.os }}
    needs: [build-cpu]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: wheels-cpu-${{ matrix.target }}
          path: dist

      - name: Install wheel
        shell: bash
        run: |
          # Use --find-links so pip selects the wheel matching this Python version
          # Get package name from any wheel in dist/
          WHEEL=$(ls dist/*.whl | head -1)
          PKG_NAME=$(echo "$WHEEL" | sed 's/-[0-9].*//' | xargs basename | tr '_' '-')
          pip install --no-index --find-links dist/ "$PKG_NAME"

      - name: Verify import and basic functionality
        shell: bash
        run: |
          python -c "
          from lam_candle import LamEngine, TIER_FREE, TIER_BETA
          assert TIER_FREE == 1
          assert TIER_BETA == 2
          engine = LamEngine()
          engine.index('test', 'Hello world')
          assert engine.doc_count() == 1
          results = engine.search('Hello')
          print(f'Smoke test passed: {len(results)} results')
          "

      - name: Verify wrapper imports
        shell: bash
        run: |
          python -c "import said_lam; print('said_lam OK')"
          python -c "import lam; print('lam OK')"