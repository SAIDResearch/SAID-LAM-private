name: Build and Release

on:
  release:
    types: [created]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which jobs to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - cpu-only
          - cuda-linux
          - cuda-windows
          - metal
          - smoke-test

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────────────────────
  # CPU wheels — work everywhere, no GPU required
  # ──────────────────────────────────────────────────────────────
  build-cpu:
    name: CPU · ${{ matrix.target }}
    if: github.event_name != 'workflow_dispatch' || inputs.job == 'all' || inputs.job == 'cpu-only'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: cpu-${{ matrix.target }}

      - name: Install Maturin
        run: pip install maturin

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            libc6-dev-arm64-cross

      - name: Build CPU wheels (Linux)
        if: runner.os == 'Linux'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
        run: |
          maturin build --release --target ${{ matrix.target }} \
            --compatibility manylinux_2_35 \
            --interpreter python3.10 python3.11 python3.12 --out dist

      - name: Build CPU wheels (macOS)
        if: runner.os == 'macOS'
        run: |
          maturin build --release --target ${{ matrix.target }} \
            --interpreter python3.10 python3.11 python3.12 --out dist

      - name: Build CPU wheels (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          maturin build --release --target ${{ matrix.target }} \
            --interpreter python3.10 python3.11 python3.12 --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-cpu-${{ matrix.target }}
          path: dist/*.whl

  # ──────────────────────────────────────────────────────────────
  # CUDA wheels — Linux x86_64 only
  # ──────────────────────────────────────────────────────────────
  build-cuda:
    name: CUDA · x86_64-linux
    if: github.event_name != 'workflow_dispatch' || inputs.job == 'all' || inputs.job == 'cuda-linux'
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.1.1-devel-ubuntu22.04
    env:
      CUDA_COMPUTE_CAP: "80"
      PIP_BREAK_SYSTEM_PACKAGES: "1"
      DEBIAN_FRONTEND: noninteractive
      TZ: Etc/UTC

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps + Python
        run: |
          export DEBIAN_FRONTEND=noninteractive
          export TZ=Etc/UTC
          ln -snf /usr/share/zoneinfo/$TZ /etc/localtime
          echo $TZ > /etc/timezone
          apt-get update
          apt-get install -y --no-install-recommends \
            software-properties-common curl gcc pkg-config libssl-dev tzdata
          add-apt-repository -y ppa:deadsnakes/ppa
          apt-get update
          apt-get install -y --no-install-recommends \
            python3.10 python3.10-dev python3.10-venv \
            python3.11 python3.11-dev python3.11-venv \
            python3.12 python3.12-dev python3.12-venv \
            python3-pip

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Maturin
        run: pip3 install maturin

      - name: Stub nvidia-smi
        run: |
          mkdir -p /usr/local/bin
          printf '#!/bin/sh\ncase "$*" in\n*--query-gpu*) echo "8.0" ;;\n*) echo "NVIDIA-SMI (stub)" ;;\nesac\n' > /usr/local/bin/nvidia-smi
          chmod +x /usr/local/bin/nvidia-smi
          /usr/local/bin/nvidia-smi --query-gpu=compute_cap --format=csv,noheader

      - name: Build CUDA wheels
        run: |
          . "$HOME/.cargo/env"
          maturin build --release --features cuda \
            --compatibility manylinux_2_35 \
            --interpreter python3.10 python3.11 python3.12 \
            --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-cuda-x86_64-linux
          path: dist/*.whl

  # ──────────────────────────────────────────────────────────────
  # CUDA wheels — Windows x86_64
  # ──────────────────────────────────────────────────────────────
  build-cuda-windows:
    name: CUDA · x86_64-pc-windows-msvc
    if: github.event_name != 'workflow_dispatch' || inputs.job == 'all' || inputs.job == 'cuda-windows'
    runs-on: windows-2022
    env:
      CUDA_COMPUTE_CAP: "80"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: cuda-windows-v2

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.17
        id: cuda-toolkit
        with:
          cuda: '12.1.1'

      - name: Setup MSVC 2022 (cl.exe) for NVCC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          vsversion: '2022'

      - name: Remove Git's link.exe (shadows MSVC linker)
        shell: pwsh
        run: |
          $gitLink = "C:\Program Files\Git\usr\bin\link.exe"
          if (Test-Path $gitLink) {
            Remove-Item $gitLink -Force
            Write-Host "Removed Git link.exe that was shadowing MSVC linker"
          }

      - name: Patch CUDA host_config.h to accept newer MSVC
        shell: pwsh
        run: |
          $hostConfig = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.1\include\crt\host_config.h"
          if (-not (Test-Path $hostConfig)) {
            $hostConfig = Get-ChildItem -Path "C:\Program Files\NVIDIA GPU Computing Toolkit" -Recurse -Filter "host_config.h" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $hostConfig) {
            Write-Error "host_config.h not found"
            exit 1
          }
          Write-Host "Patching: $hostConfig"
          $lines = Get-Content $hostConfig
          $patched = $lines | ForEach-Object {
            if ($_ -match '#\s*error' -and $_ -match 'Visual Studio' -and $_ -match 'unsupported') {
              "// PATCHED: " + $_
            } else {
              $_
            }
          }
          Set-Content $hostConfig -Value $patched
          Write-Host "Patched. Lines 151-156:"
          for ($i = 150; $i -lt [Math]::Min(156, $patched.Count); $i++) { Write-Host "$($i+1): $($patched[$i])" }

      - name: Find and set VS 2022 cl.exe
        shell: pwsh
        run: |
          $clPath = & vswhere -version '[17.0,18.0)' -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -find 'VC\Tools\MSVC\*\bin\Hostx64\x64\cl.exe' | Select-Object -First 1
          if (-not $clPath) {
            $clPath = Get-ChildItem "C:\Program Files\Microsoft Visual Studio\2022\*\VC\Tools\MSVC\*\bin\Hostx64\x64\cl.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          }
          if ($clPath) {
            $clDir = Split-Path $clPath
            Write-Host "Found cl.exe at: $clPath"
            & $clPath 2>&1 | Select-String "Version"
            echo "NVCC_CCBIN=$clDir" >> $env:GITHUB_ENV
          } else {
            Write-Host "Warning: Could not find VS 2022 cl.exe, relying on PATH"
          }

      - name: Install Maturin
        run: pip install maturin

      - name: Build CUDA wheels (Windows)
        shell: pwsh
        run: |
          maturin build --release --features cuda `
            --target x86_64-pc-windows-msvc `
            --interpreter python3.10 python3.11 python3.12 `
            --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-cuda-x86_64-pc-windows-msvc
          path: dist/*.whl

  # ──────────────────────────────────────────────────────────────
  # Metal wheels — macOS Apple Silicon GPU
  # ──────────────────────────────────────────────────────────────
  build-metal:
    name: Metal · aarch64-apple-darwin
    if: github.event_name != 'workflow_dispatch' || inputs.job == 'all' || inputs.job == 'metal'
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: metal

      - name: Install Maturin
        run: pip install maturin

      - name: Verify Metal availability
        run: |
          xcrun --sdk macosx --show-sdk-path
          ls "$(xcrun --sdk macosx --show-sdk-path)/System/Library/Frameworks/Metal.framework" || echo "WARNING: Metal.framework not found"

      - name: Build Metal wheels
        run: |
          maturin build --release --features metal \
            --interpreter python3.10 python3.11 python3.12 \
            --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-metal-aarch64-apple-darwin
          path: dist/*.whl

  # ──────────────────────────────────────────────────────────────
  # Publish to PyPI
  # ──────────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [build-cpu, build-cuda, build-cuda-windows, build-metal, smoke-test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref, 'rc')
    environment: pypi-publish

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List all artifacts
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/

  # ──────────────────────────────────────────────────────────────
  # Publish to TestPyPI (release candidates: v*-rc*)
  # ──────────────────────────────────────────────────────────────
  publish-test:
    name: Publish to TestPyPI
    needs: [build-cpu, build-cuda, build-cuda-windows, build-metal, smoke-test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, 'rc')
    environment: testpypi-publish

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List all artifacts
        run: ls -lh dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

  # ──────────────────────────────────────────────────────────────
  # GitHub Release
  # ──────────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: [build-cpu, build-cuda, build-cuda-windows, build-metal]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release and upload wheels
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Smoke test
  # ──────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test · ${{ matrix.os }}
    needs: [build-cpu]
    if: |
      always() && 
      (needs.build-cpu.result == 'success') &&
      (github.event_name != 'workflow_dispatch' || inputs.job == 'all' || inputs.job == 'cpu-only' || inputs.job == 'smoke-test')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: wheels-cpu-${{ matrix.target }}
          path: dist

      - name: Install wheel
        shell: bash
        run: |
          # 1. Force upgrade pip
          python -m pip install --upgrade pip

          # 2. Install numpy explicitly from PyPI
          pip install numpy

          # 3. Install the wheel by direct file path
          WHEEL=$(ls dist/*cp311*.whl | head -n 1)
          pip install "$WHEEL"

      - name: Verify import and basic functionality
        shell: bash
        run: |
          python -c "
          from lam_candle import LamEngine, TIER_FREE, TIER_BETA
          assert TIER_FREE == 1, f'TIER_FREE expected 1, got {TIER_FREE}'
          assert TIER_BETA == 2, f'TIER_BETA expected 2, got {TIER_BETA}'
          # Verify LamEngine is constructable and has expected methods
          assert hasattr(LamEngine, 'search_kv'), 'Missing search_kv method'
          assert hasattr(LamEngine, 'index'), 'Missing index method'
          assert hasattr(LamEngine, 'doc_count'), 'Missing doc_count method'
          print('Smoke test passed: imports OK, constants OK, API surface OK')
          "

      - name: Verify wrapper imports
        shell: bash
        run: |
          pip install mteb
          python -c "import said_lam; print('said_lam OK')"
          python -c "import lam; print('lam OK')"